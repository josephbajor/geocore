# Kernel determinism policy: platform libm transcendentals are not correctly
# rounded and differ across platforms, libm versions, and compile-time vs
# runtime evaluation. Kernel code must use kcore::math instead (bit-identical
# everywhere). sqrt/abs/floor/ceil/round and arithmetic are exempt: IEEE 754
# fully specifies them. Test code MAY compare against platform libm under an
# explicit #[allow(clippy::disallowed_methods)].
disallowed-methods = [
    { path = "f64::sin", reason = "use kcore::math::sin (deterministic)" },
    { path = "f64::cos", reason = "use kcore::math::cos (deterministic)" },
    { path = "f64::sin_cos", reason = "use kcore::math::sincos (deterministic)" },
    { path = "f64::tan", reason = "no deterministic port yet; add to kcore::math first" },
    { path = "f64::atan", reason = "use kcore::math::atan (deterministic)" },
    { path = "f64::atan2", reason = "use kcore::math::atan2 (deterministic)" },
    { path = "f64::asin", reason = "no deterministic port yet; add to kcore::math first" },
    { path = "f64::acos", reason = "no deterministic port yet; add to kcore::math first" },
    { path = "f64::exp", reason = "no deterministic port yet; add to kcore::math first" },
    { path = "f64::ln", reason = "no deterministic port yet; add to kcore::math first" },
    { path = "f64::log2", reason = "no deterministic port yet; add to kcore::math first" },
    { path = "f64::log10", reason = "no deterministic port yet; add to kcore::math first" },
    { path = "f64::powf", reason = "no deterministic port yet; add to kcore::math first" },
    { path = "f64::hypot", reason = "no deterministic port yet; add to kcore::math first" },
    { path = "f64::sinh", reason = "no deterministic port yet; add to kcore::math first" },
    { path = "f64::cosh", reason = "no deterministic port yet; add to kcore::math first" },
    { path = "f64::tanh", reason = "no deterministic port yet; add to kcore::math first" },
]
