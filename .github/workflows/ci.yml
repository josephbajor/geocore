name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  checks:
    name: Checks (${{ matrix.os }})
    # Preserve the existing cross-platform format and Clippy evidence.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # Keep this exact version synchronized with rust-toolchain.toml and the
      # workspace rust-version. An explicit input prevents runner-level rustup
      # environment overrides from silently selecting a floating toolchain.
      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: 1.93.0
          components: rustfmt, clippy
      - name: Cache Cargo downloads
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: cargo-home-${{ runner.os }}-1.93.0-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-home-${{ runner.os }}-1.93.0-
      - name: Cache debug build artifacts
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: target/
          key: cargo-target-checks-${{ runner.os }}-1.93.0-${{ hashFiles('Cargo.lock') }}-${{ github.sha }}
          restore-keys: cargo-target-checks-${{ runner.os }}-1.93.0-${{ hashFiles('Cargo.lock') }}-
      - name: Report Rust toolchain
        run: rustc --version --verbose
      - name: Format
        run: cargo fmt --all --check
      - name: Lint
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: Test (${{ matrix.os }}, ${{ matrix.profile.name }})
    # The three-OS matrix is load-bearing: the determinism suite pins golden
    # hashes of numeric results, so any cross-platform drift fails here.
    # Debug and release retain full three-OS coverage, but run concurrently.
    # Keep the workspace command whole so new members and test targets remain
    # covered automatically without maintaining a hand-written shard manifest.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        profile:
          - name: debug
            args: ""
          - name: release
            args: --release
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: 1.93.0
      - name: Cache Cargo downloads
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: cargo-home-${{ runner.os }}-1.93.0-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-home-${{ runner.os }}-1.93.0-
      - name: Cache ${{ matrix.profile.name }} build artifacts
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: target/
          key: cargo-target-tests-${{ runner.os }}-1.93.0-${{ matrix.profile.name }}-${{ hashFiles('Cargo.lock') }}-${{ github.sha }}
          restore-keys: cargo-target-tests-${{ runner.os }}-1.93.0-${{ matrix.profile.name }}-${{ hashFiles('Cargo.lock') }}-
      - name: Test (${{ matrix.profile.name }})
        # Optimized codegen must not change numeric results either.
        run: cargo test --workspace ${{ matrix.profile.args }}

  quality-contracts:
    name: Python and oracle contracts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: 1.93.0
      - name: Cache Cargo downloads
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: cargo-home-${{ runner.os }}-1.93.0-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-home-${{ runner.os }}-1.93.0-
      - name: Cache release build artifacts
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: target/
          key: cargo-target-quality-${{ runner.os }}-1.93.0-release-${{ hashFiles('Cargo.lock') }}-${{ github.sha }}
          restore-keys: cargo-target-quality-${{ runner.os }}-1.93.0-release-${{ hashFiles('Cargo.lock') }}-
      - name: Validate Python tooling contracts
        run: |
          python3 -m unittest discover -s scripts/tests -v
          python3 scripts/benchmark_baseline.py smoke
          python3 scripts/benchmark_baseline.py validate
          python3 scripts/package_contract.py
          python3 scripts/legacy_api_contract.py
          python3 scripts/doc_budget.py
      - name: Regenerate the exact oracle bundle
        run: cargo run --locked --release -p kxt --bin xt_oracle -- export "$RUNNER_TEMP/oracle-outbox"
      - name: Verify licensed-host certification freshness
        run: python3 scripts/oracle_loop.py certification-check --outbox "$RUNNER_TEMP/oracle-outbox"
      - name: Regenerate the exact Boolean oracle bundle
        run: cargo run --locked --release -p kernel --example boolean_xt_oracle -- "$RUNNER_TEMP/boolean-oracle-outbox"
      - name: Verify Boolean licensed-host certification freshness
        run: |
          python3 scripts/oracle_loop.py certification-check \
            --outbox "$RUNNER_TEMP/boolean-oracle-outbox" \
            --record docs/oracle-boolean-certification.json

  benchmark-smoke:
    name: Benchmark contracts and bounded smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: 1.93.0
      - name: Cache benchmark Cargo downloads
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: cargo-home-bench-${{ runner.os }}-1.93.0-${{ hashFiles('benches/Cargo.lock') }}
          restore-keys: cargo-home-bench-${{ runner.os }}-1.93.0-
      - name: Cache benchmark build artifacts
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: benches/target/
          key: cargo-target-bench-${{ runner.os }}-1.93.0-${{ hashFiles('benches/Cargo.lock') }}-${{ github.sha }}
          restore-keys: cargo-target-bench-${{ runner.os }}-1.93.0-${{ hashFiles('benches/Cargo.lock') }}-
      - name: Validate excluded benchmark package and lock
        run: |
          cargo metadata --manifest-path benches/Cargo.toml --locked --format-version 1 --no-deps > /dev/null
          cargo test --manifest-path benches/Cargo.toml --locked
      - name: Compile every benchmark target
        run: cargo bench --manifest-path benches/Cargo.toml --locked --no-run
      - name: Smoke the smallest fixture only
        env:
          KERNEL_BENCH_SMOKE: "1"
        run: |
          cargo bench --manifest-path benches/Cargo.toml --locked --bench benchmark_contract -- harness/contract/tiny-v1/64/default-v1
          cargo bench --manifest-path benches/Cargo.toml --locked --bench graph_build -- graph/build/independent-planes-v1/1/default-v1
          cargo bench --manifest-path benches/Cargo.toml --locked --bench graph_traversal -- graph/traverse/offset-chain-closure-v1/1/dependency-first-v1
          cargo bench --manifest-path benches/Cargo.toml --locked --bench body_tessellation -- topology/body-tessellation/block-v3/1/chord-1e-2-v3
          cargo bench --manifest-path benches/Cargo.toml --locked --bench body_tessellation -- topology/body-tessellation/mixed-store-cylinder-v3/1/chord-1e-2-v3
          cargo bench --manifest-path benches/Cargo.toml --locked --bench body_tessellation -- topology/body-tessellation/imported-curved-nurbs-block-v3/1/chord-1e-2-v3
          cargo bench --manifest-path benches/Cargo.toml --locked --bench body_tessellation -- topology/body-tessellation/imported-plane-sheet-v3/1/chord-1e-2-v3
          cargo bench --manifest-path benches/Cargo.toml --locked --bench body_tessellation -- topology/body-tessellation/imported-cylinder-sheet-v3/1/chord-1e-2-v3
          cargo bench --manifest-path benches/Cargo.toml --locked --bench face_tessellation -- geometry/face-tessellation/plane-v2/outer/chord-1e-2-v2
          cargo bench --manifest-path benches/Cargo.toml --locked --bench curve_pair_isolation -- geometry/curve-pair-isolation/poly-separated-v1/1/depth-3-v1
          cargo bench --manifest-path benches/Cargo.toml --locked --bench curve_pair_solve -- geometry/curve-pair-solve/poly-transverse-v1/1/default-v1
      - name: Upload advisory smoke samples
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmark-smoke-${{ github.sha }}
          path: |
            benches/target/criterion/harness_contract_tiny-v1_64/default-v1/new/
            benches/target/criterion/graph_build_independent-planes-v1_1/default-v1/new/
            benches/target/criterion/graph_traverse_offset-chain-closure-v1_1/dependency-first-v1/new/
            benches/target/criterion/topology_body-tessellation_block-v3_1/chord-1e-2-v3/new/
            benches/target/criterion/topology_body-tessellation_imported-curved-nurbs-block-v3_1/chord-1e-2-v3/new/
            benches/target/criterion/topology_body-tessellation_imported-plane-sheet-v3_1/chord-1e-2-v3/new/
            benches/target/criterion/topology_body-tessellation_imported-cylinder-sheet-v3_1/chord-1e-2-v3/new/
            benches/target/criterion/geometry_face-tessellation_plane-v2_outer/chord-1e-2-v2/new/
            benches/target/criterion/geometry_curve-pair-isolation_poly-separated-v1_1/depth-3-v1/new/
            benches/target/criterion/geometry_curve-pair-solve_poly-transverse-v1_1/default-v1/new/
          if-no-files-found: ignore
          retention-days: 7

  fuzz-smoke:
    name: Bounded fuzz smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RUSTUP_TOOLCHAIN: nightly-2026-01-22
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install exact fuzz toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: nightly-2026-01-22
      - name: Cache fuzz Cargo downloads
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: cargo-home-fuzz-${{ runner.os }}-nightly-2026-01-22-cargo-fuzz-0.13.2-${{ hashFiles('fuzz/Cargo.lock') }}
          restore-keys: cargo-home-fuzz-${{ runner.os }}-nightly-2026-01-22-cargo-fuzz-0.13.2-
      - name: Cache fuzz build artifacts
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: fuzz/target/
          key: cargo-target-fuzz-${{ runner.os }}-nightly-2026-01-22-${{ hashFiles('fuzz/Cargo.lock') }}-${{ github.sha }}
          restore-keys: cargo-target-fuzz-${{ runner.os }}-nightly-2026-01-22-${{ hashFiles('fuzz/Cargo.lock') }}-
      - name: Install exact fuzz runner
        run: |
          cargo install cargo-fuzz --version 0.13.2 --locked --root "$RUNNER_TEMP/cargo-fuzz"
          echo "$RUNNER_TEMP/cargo-fuzz/bin" >> "$GITHUB_PATH"
      - name: Verify fuzz tool versions
        working-directory: fuzz
        run: |
          rustc --version --verbose
          test "$(cargo fuzz --version)" = "cargo-fuzz 0.13.2"
      - name: Validate deterministic fuzz contract
        run: python3 -m unittest scripts.tests.test_fuzz_contract -v
      - name: Validate locked fuzz package and stage writable corpora
        working-directory: fuzz
        run: |
          cargo fetch --locked
          cargo metadata --locked --offline --format-version 1 > /dev/null
          cargo test --locked --offline --no-default-features
          CARGO_NET_OFFLINE=true cargo fuzz build xt_read --features fuzzing
          CARGO_NET_OFFLINE=true cargo fuzz build nurbs_constructors --features fuzzing
          sha256sum Cargo.toml Cargo.lock contract.json > "$RUNNER_TEMP/fuzz-contract.sha256"
          mkdir -p artifacts/xt_read artifacts/nurbs_constructors
      - id: fuzz_xt_read
        name: Fuzz X_T read contract (20 seconds)
        continue-on-error: true
        env:
          CARGO_NET_OFFLINE: "true"
        run: python3 scripts/fuzz_smoke.py xt_read
      - id: fuzz_nurbs
        name: Fuzz NURBS constructors contract (20 seconds)
        continue-on-error: true
        env:
          CARGO_NET_OFFLINE: "true"
        run: python3 scripts/fuzz_smoke.py nurbs_constructors
      - name: Verify fuzz contract files stayed locked
        if: always()
        working-directory: fuzz
        run: |
          sha256sum --check "$RUNNER_TEMP/fuzz-contract.sha256"
          git diff --exit-code -- Cargo.toml Cargo.lock contract.json corpus
      - name: Upload X_T failure artifact
        if: ${{ always() && steps.fuzz_xt_read.outcome == 'failure' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fuzz-xt-read-${{ github.run_id }}
          path: fuzz/artifacts/xt_read/
          if-no-files-found: warn
          retention-days: 7
      - name: Upload NURBS failure artifact
        if: ${{ always() && steps.fuzz_nurbs.outcome == 'failure' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fuzz-nurbs-constructors-${{ github.run_id }}
          path: fuzz/artifacts/nurbs_constructors/
          if-no-files-found: warn
          retention-days: 7
      - name: Enforce fuzz outcomes
        if: always()
        env:
          XT_OUTCOME: ${{ steps.fuzz_xt_read.outcome }}
          NURBS_OUTCOME: ${{ steps.fuzz_nurbs.outcome }}
        run: |
          if [ "$XT_OUTCOME" != success ] || [ "$NURBS_OUTCOME" != success ]; then
            echo "fuzz-smoke failed: xt_read=$XT_OUTCOME nurbs_constructors=$NURBS_OUTCOME"
            exit 1
          fi
