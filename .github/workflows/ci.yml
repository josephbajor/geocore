name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    # The three-OS matrix is load-bearing: the determinism suite pins golden
    # hashes of numeric results, so any cross-platform drift fails here.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      # Keep this exact version synchronized with rust-toolchain.toml and the
      # workspace rust-version. An explicit input prevents runner-level rustup
      # environment overrides from silently selecting a floating toolchain.
      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0
          components: rustfmt, clippy
      - name: Report Rust toolchain
        run: rustc --version --verbose
      - name: Format
        run: cargo fmt --all --check
      - name: Lint
        run: cargo clippy --all-targets -- -D warnings
      - name: Test (debug)
        run: cargo test --workspace
      - name: Test (release)
        # Optimized codegen must not change numeric results either.
        run: cargo test --workspace --release
