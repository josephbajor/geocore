name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    # The three-OS matrix is load-bearing: the determinism suite pins golden
    # hashes of numeric results, so any cross-platform drift fails here.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt --all --check
      - name: Lint
        run: cargo clippy --all-targets -- -D warnings
      - name: Test (debug)
        run: cargo test --workspace
      - name: Test (release)
        # Optimized codegen must not change numeric results either.
        run: cargo test --workspace --release
